name: Genesis Evolver

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.GENESIS_APP_ID }}
          private-key: ${{ secrets.GENESIS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "genesis-dev-bot[bot]"
          prompt: |
            Run the evolver agent defined in .claude/agents/evolver.md.
            This is a scheduled review cycle — review recent system behavior and apply improvements.
          claude_args: "--max-turns 15 --allowedTools Read,Edit,Write,Bash,Glob,Grep,Agent"
