name: Genesis Evolver

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the evolver agent defined in .claude/agents/evolver.md.
            This is a scheduled review cycle — review recent system behavior and apply improvements.
          claude_args: "--max-turns 15 --allowedTools Read,Edit,Bash,Glob,Grep,Agent"
