name: Genesis Orchestrator (Events)

on:
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, closed, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    # Skip events from bots to prevent loops
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.GENESIS_APP_ID }}
          private-key: ${{ secrets.GENESIS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            Run the orchestrator agent defined in .claude/agents/orchestrator.md.

            An event triggered this run:
            - Event: ${{ github.event_name }} / ${{ github.event.action }}

            Assess this event in context of the project state and take appropriate action.
          claude_args: "--max-turns 10 --allowedTools Read,Edit,Bash,Glob,Grep,Agent"
