name: Genesis Orchestrator (Events)

on:
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, closed, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent event runs — the main source of duplicate issue creation.
# When multiple events fire at once (e.g. closing a milestone issue triggers both
# "issues: closed" and "issue_comment: created"), both runs check-duplicate before
# either has created anything, so both create the same issues.
# queue: true ensures only one event run executes at a time; the next waits.
concurrency:
  group: genesis-events
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    # Skip events from bots to prevent loops
    if: github.actor != 'github-actions[bot]' && github.actor != 'genesis-dev-bot[bot]' && github.actor != 'claude[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.GENESIS_APP_ID }}
          private-key: ${{ secrets.GENESIS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "genesis-dev-bot[bot]"
          prompt: |
            Run the orchestrator agent defined in .claude/agents/orchestrator.md.

            An event triggered this run:
            - Event: ${{ github.event_name }} / ${{ github.event.action }}

            Assess this event in context of the project state and take appropriate action.
          claude_args: "--max-turns 20 --allowedTools Read,Edit,Write,Bash,Glob,Grep,Agent"
