name: Genesis Orchestrator (Scheduled)

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the orchestrator agent defined in .claude/agents/orchestrator.md.
            This is a scheduled run — assess project state and advance work.
          claude_args: "--max-turns 20 --allowedTools Read,Edit,Bash,Glob,Grep,Agent"
