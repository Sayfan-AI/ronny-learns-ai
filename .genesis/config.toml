[project]
name = "ronny-learns-ai"
goal = "Build an educational web application that teaches Ronny (a complete non-programmer with no familiarity with APIs, GitHub, or coding) about the genesis system and AI in general. Start with the absolute basics: a simple, friendly web interface with a GitHub registration tutorial — step-by-step instructions so Gigi can invite Ronny to the project. The system should use plain language throughout, avoid jargon, and progressively introduce concepts from the ground up."

[loki]
# Grafana Cloud Loki push endpoint
# Set via environment: GENCTL_LOKI_URL
endpoint = ""
# Set via environment: GENCTL_LOKI_USER
user = ""
# Set via environment: GENCTL_LOKI_TOKEN
token = ""

[issues]
# Backend: "github" or "linear"
backend = "github"

[a2h]
# A2H gateway endpoint
# Set via environment: GENCTL_A2H_GATEWAY_URL
gateway_url = ""

